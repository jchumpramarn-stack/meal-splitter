<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>หารค่าข้าว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121212; 
  --surface: rgba(255, 255, 255, 0.05); 
  --card: #1a1a1a;
  --border: rgba(255, 255, 255, 0.15); 
  --accent: #ffffff; 
  --accent2: #e0e0e0;
  --red: #ff6b6b; 
  --green: #4caf7d; 
  --text: #ffffff; 
  --muted: rgba(255, 255, 255, 0.6); 
  --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; min-height: 100vh; padding-bottom: 80px; }

header { background: linear-gradient(135deg, #111111, #222222); border-bottom: 2px solid var(--border); padding: 28px 20px 22px; text-align: center; position: relative; overflow: hidden; }
header::before { content:''; position:absolute; top:-40px; left:50%; transform:translateX(-50%); width:300px; height:120px; background:radial-gradient(ellipse,rgba(255,255,255,.1),transparent 70%); }
header .emo { font-size:2.4rem; display:block; margin-bottom:6px; }
header h1 { font-family:'Prompt',sans-serif; font-size:1.85rem; font-weight:800; color:var(--text); letter-spacing:-.5px; }
header p { color:var(--muted); font-size:.85rem; margin-top:4px; }

.wrap { max-width:600px; margin:0 auto; padding:0 16px; }
.slabel { font-family:'Prompt',sans-serif; font-size:.75rem; font-weight:700; letter-spacing:2px; color:var(--text); text-transform:uppercase; margin:28px 0 12px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

#person-list { display:flex; flex-direction:column; gap:12px; }
.prow { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; animation:fi .22s ease; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.prow:focus-within { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 12px rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
.pnum { background:var(--text); color:#000; font-family:'Prompt',sans-serif; font-weight:700; font-size:.75rem; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

.finput { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Sarabun',sans-serif; font-size:1.05rem; padding:4px 0; min-width:0; }
.finput::placeholder { color:var(--muted); font-weight:300; }

#menu-list { display:flex; flex-direction:column; gap:12px; }
.mrow { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; flex-wrap:wrap; animation:fi .22s ease; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.mrow:focus-within { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 12px rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
.mname { flex:2; min-width:80px; }
.mprice { width:62px; text-align:right; font-weight:600; }
.pricebox { display:flex; align-items:center; gap:4px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:6px 12px; min-width:90px; transition: border 0.3s; }
.mrow:focus-within .pricebox { border-color: rgba(255,255,255,.5); }
.pricebox .sym { color:var(--text); font-size:.85rem; font-weight:600; flex-shrink:0; }
.dvdr { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.badge { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3); color:var(--text); font-size:.7rem; font-weight:600; padding:3px 10px; border-radius:10px; margin-left:auto; white-space:nowrap; min-height:20px; }

.eaters-sec { width:100%; margin-top:10px; }
.eaters-lbl { font-size:.8rem; color:var(--muted); margin-bottom:8px; }
.eaters-grid { display:flex; flex-wrap:wrap; gap:8px; }
.chip { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); font-size:.8rem; font-family:'Sarabun',sans-serif; cursor:pointer; -webkit-user-select:none; user-select:none; color:var(--muted); background:transparent; transition:all .2s; touch-action:manipulation; }
.chip.on { background:rgba(76,175,125,.15); border-color:var(--green); color:var(--green); font-weight:600; box-shadow: 0 2px 8px rgba(76,175,125,0.2); }
.chip .dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; cursor:pointer; font-family:'Prompt',sans-serif; font-weight:600; border-radius:12px; padding:12px 18px; font-size:.95rem; transition:all .2s; touch-action:manipulation; }
.btn-ghost { background:transparent; border:1.5px dashed var(--border); color:var(--text); }
.btn-ghost:hover { background: rgba(255,255,255,0.05); }
.btn-ghost:active { border-color:var(--text); border-style: solid; }
.btn-primary { background:var(--text); color:#000; width:100%; padding:16px; font-size:1.1rem; font-weight:800; margin-top:16px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
.btn-primary:active { background:var(--accent2); transform: scale(0.98); }
.btn-add { margin-top:10px; width: 100%; }
.btnrm { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.2rem; padding:4px 8px; border-radius:6px; line-height:1; touch-action:manipulation; transition: color 0.2s; }
.btnrm:hover { color: var(--red); }

#summary-sec { display:none; }
hr.div { border:none; border-top:1px solid var(--border); margin:30px 0; }

/* อัปเดต CSS สำหรับใบเสร็จยอดรวม */
.grand { background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02)); border:1px solid var(--text); border-radius:var(--r); padding:22px 24px; display:flex; flex-direction:column; margin-bottom:16px; box-shadow: 0 4px 15px rgba(255,255,255,0.05); }
.grand-header { display:flex; justify-content:space-between; align-items:center; width:100%; }
.grand-items { width:100%; margin-top:16px; padding-top:12px; border-top:1px dashed rgba(255,255,255,.2); display:flex; flex-direction:column; gap:6px; }
.gitem { display:flex; justify-content:space-between; font-size:.95rem; color:var(--muted); }
.gitem-a { color:var(--text); font-weight:600; }

.grand-lbl { font-family:'Prompt',sans-serif; font-weight:700; font-size:1.05rem; }
.grand-lbl small { display:block; font-size:.8rem; color:var(--muted); font-weight:400; margin-top:4px; }
.grand-amt { font-family:'Prompt',sans-serif; font-weight:800; font-size:1.8rem; color:var(--text); }

.scard { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:12px; transition: transform 0.2s; }
.scard:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }
.shead { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); background: rgba(255,255,255,0.02); }
.savatar { width:38px; height:38px; border-radius:50%; background:var(--text); display:flex; align-items:center; justify-content:center; font-family:'Prompt',sans-serif; font-weight:800; font-size:1rem; color:#000; flex-shrink:0; }
.sname { font-family:'Prompt',sans-serif; font-weight:600; font-size:1.05rem; }
.stotal { margin-left:auto; font-family:'Prompt',sans-serif; font-weight:800; font-size:1.2rem; color:var(--text); }
.sitems { padding:14px 20px; }
.sitem { display:flex; justify-content:space-between; padding:6px 0; font-size:.9rem; border-bottom:1px dashed rgba(255,255,255,.15); color:var(--muted); }
.sitem:last-child { border-bottom:none; }
.sitem-n { flex:1; }
.sitem-a { color:var(--text); font-weight: 600; }

.export-row { display:flex; gap:10px; margin-top:20px; }
.btnexp { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'Prompt',sans-serif; font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; touch-action:manipulation; }
.btnexp:active { border-color:var(--text); background: rgba(255,255,255,0.1); }
.btnexp.busy { opacity:.55; pointer-events:none; }
.btn-reset { background:transparent; border:1px solid var(--red); color:var(--red); width:100%; padding:14px; font-size:.95rem; margin-top:12px; border-radius:12px; touch-action:manipulation; }
.btn-reset:active { background:rgba(255,107,107,.1); }
.credit { text-align:center; margin-top:40px; padding:20px; border-top:1px solid var(--border); }
.credit p { color:var(--muted); font-size:.8rem; }
.credit strong { color:var(--text); font-family:'Prompt',sans-serif; }
@keyframes fi { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<header>
  <span class="emo">🍜</span>
  <h1>หารค่าข้าว</h1>
  <p>แยกค่าอาหารได้แม่นยำ ใครกินอะไร จ่ายแค่นั้น</p>
</header>

<div class="wrap">
  <div class="slabel">① รายชื่อคนกิน (รักเอิร์น)</div>
  <div class="card">
    <div id="person-list"></div>
    <button class="btn btn-ghost btn-add" id="btn-addp">+ เพิ่มคน</button>
  </div>

  <div class="slabel">② รายการอาหาร & ราคา</div>
  <div class="card">
    <div id="menu-list"></div>
    <button class="btn btn-ghost btn-add" id="btn-addm">+ เพิ่มเมนู</button>
  </div>

<button class="btn btn-primary" id="btn-calc">🧮 คำนวณแยกเลย!</button>

  <div id="summary-sec">
    <hr class="div">
    <div class="slabel">③ สรุปค่าใช้จ่ายรายคน</div>
    
    <!-- อัปเดต HTML กล่องยอดรวม -->
    <div class="grand" id="grand-receipt">
      <div class="grand-header">
        <div class="grand-lbl">ค่าอาหารรวมทั้งหมด<small>ยอดรวมทุกเมนู</small></div>
        <div class="grand-amt" id="grand-total">฿0</div>
      </div>
      <div class="grand-items" id="grand-items">
        <!-- รายการอาหารจะถูกใส่ตรงนี้ -->
      </div>
    </div>
    
    <div id="summaries"></div>
    <div class="export-row">
      <button class="btnexp" id="btn-img">🖼️ บันทึกรูป</button>
      <button class="btnexp" id="btn-pdf">📄 บันทึก PDF</button>
    </div>
    <button class="btn btn-reset" id="btn-reset">🔄 เริ่มใหม่</button>
    <div class="credit">
      <p>คิดโดย <strong>Jitti Chumpramarn</strong></p>
      <p style="margin-top:4px">หารค่าข้าวแฟร์ๆ ใครกินอะไร จ่ายแค่นั้น 🍽️</p>
    </div>
  </div>
</div>

<script>
var people = [], menus = [], pc = 0, mc = 0;

function plabel(p) {
  return p.name.trim() || ('คน ' + (people.indexOf(p) + 1));
}

function addPerson() {
  pc++;
  var p = { id: 'p' + pc, name: '' };
  people.push(p);

  var list = document.getElementById('person-list');
  var row = document.createElement('div');
  row.className = 'prow';
  row.dataset.pid = p.id;

  var num = document.createElement('div');
  num.className = 'pnum';
  num.textContent = people.length;

  var inp = document.createElement('input');
  inp.className = 'finput';
  inp.type = 'text';
  inp.inputMode = 'text';
  inp.autocomplete = 'off';
  inp.setAttribute('autocorrect', 'off');
  inp.setAttribute('spellcheck', 'false');
  inp.placeholder = 'ชื่อคน...';
  inp.addEventListener('input', function() {
    p.name = inp.value;
  });
  inp.addEventListener('blur', function() {
    document.querySelectorAll('.chip[data-pid="' + p.id + '"] .clbl').forEach(function(el) {
      el.textContent = plabel(p);
    });
  });

  var rm = document.createElement('button');
  rm.className = 'btnrm';
  rm.type = 'button';
  rm.textContent = '✕';
  rm.addEventListener('click', function() { removePerson(p.id); });

  row.appendChild(num);
  row.appendChild(inp);
  row.appendChild(rm);
  list.appendChild(row);

  menus.forEach(function(m) {
    m.eaters.push(p.id);
    var grid = document.querySelector('.eaters-grid[data-mid="' + m.id + '"]');
    if (grid) grid.appendChild(makeChip(m, p));
    refreshBadge(m);
  });
}

function removePerson(id) {
  var idx = people.findIndex(function(p) { return p.id === id; });
  if (idx === -1) return;
  people.splice(idx, 1);
  menus.forEach(function(m) {
    m.eaters = m.eaters.filter(function(e) { return e !== id; });
  });
  var row = document.querySelector('.prow[data-pid="' + id + '"]');
  if (row) row.remove();
  document.querySelectorAll('.prow').forEach(function(r, i) {
    r.querySelector('.pnum').textContent = i + 1;
  });
  document.querySelectorAll('.chip[data-pid="' + id + '"]').forEach(function(c) { c.remove(); });
  menus.forEach(refreshBadge);
}

function addMenu() {
  mc++;
  var m = { id: 'm' + mc, name: '', price: '', eaters: people.map(function(p) { return p.id; }) };
  menus.push(m);

  var list = document.getElementById('menu-list');
  var row = document.createElement('div');
  row.className = 'mrow';
  row.dataset.mid = m.id;

  var nameInp = document.createElement('input');
  nameInp.className = 'finput mname';
  nameInp.type = 'text';
  nameInp.inputMode = 'text';
  nameInp.autocomplete = 'off';
  nameInp.setAttribute('autocorrect', 'off');
  nameInp.setAttribute('spellcheck', 'false');
  nameInp.placeholder = 'ชื่อเมนู...';
  nameInp.addEventListener('input', function() { m.name = nameInp.value; });

  var dvdr = document.createElement('div');
  dvdr.className = 'dvdr';

  var pbox = document.createElement('div');
  pbox.className = 'pricebox';
  var sym = document.createElement('span');
  sym.className = 'sym';
  sym.textContent = '฿';

  var priceInp = document.createElement('input');
  priceInp.className = 'finput mprice';
  priceInp.type = 'text';
  priceInp.inputMode = 'decimal';
  priceInp.pattern = '[0-9]*\\.?[0-9]*';
  priceInp.autocomplete = 'off';
  priceInp.placeholder = '0';
  priceInp.addEventListener('input', function() {
    var v = priceInp.value.replace(/[^0-9.]/g, '');
    if (v !== priceInp.value) {
      var pos = priceInp.selectionStart - (priceInp.value.length - v.length);
      priceInp.value = v;
      priceInp.setSelectionRange(pos, pos);
    }
    m.price = v;
  });
  priceInp.addEventListener('blur', function() {
    refreshBadge(m);
  });

  pbox.appendChild(sym);
  pbox.appendChild(priceInp);

  var rm = document.createElement('button');
  rm.className = 'btnrm';
  rm.type = 'button';
  rm.textContent = '✕';
  rm.addEventListener('click', function() { removeMenu(m.id); });

  var bdg = document.createElement('span');
  bdg.className = 'badge';
  bdg.dataset.bdg = m.id;

  var esec = document.createElement('div');
  esec.className = 'eaters-sec';
  var elbl = document.createElement('div');
  elbl.className = 'eaters-lbl';
  elbl.textContent = 'ใครกินบ้าง?';
  var grid = document.createElement('div');
  grid.className = 'eaters-grid';
  grid.dataset.mid = m.id;
  people.forEach(function(p) { grid.appendChild(makeChip(m, p)); });
  esec.appendChild(elbl);
  esec.appendChild(grid);

  row.appendChild(nameInp);
  row.appendChild(dvdr);
  row.appendChild(pbox);
  row.appendChild(rm);
  row.appendChild(bdg);
  row.appendChild(esec);
  list.appendChild(row);
  refreshBadge(m);
}

function removeMenu(id) {
  menus = menus.filter(function(m) { return m.id !== id; });
  var row = document.querySelector('.mrow[data-mid="' + id + '"]');
  if (row) row.remove();
}

function makeChip(m, p) {
  var chip = document.createElement('span');
  chip.className = 'chip' + (m.eaters.indexOf(p.id) !== -1 ? ' on' : '');
  chip.dataset.pid = p.id;
  chip.dataset.mid = m.id;
  var dot = document.createElement('span');
  dot.className = 'dot';
  var lbl = document.createElement('span');
  lbl.className = 'clbl';
  lbl.textContent = plabel(p);
  chip.appendChild(dot);
  chip.appendChild(lbl);
  chip.addEventListener('click', function() {
    var i = m.eaters.indexOf(p.id);
    if (i !== -1) { m.eaters.splice(i, 1); chip.classList.remove('on'); }
    else { m.eaters.push(p.id); chip.classList.add('on'); }
    refreshBadge(m);
  });
  return chip;
}

function refreshBadge(m) {
  var bdg = document.querySelector('.badge[data-bdg="' + m.id + '"]');
  if (!bdg) return;
  var n = m.eaters.length, price = parseFloat(m.price) || 0;
  bdg.textContent = (n > 1 && price > 0) ? ('÷' + n + ' = ฿' + (price / n).toFixed(2) + '/คน') : '';
}

document.getElementById('btn-calc').addEventListener('click', function() {
  if (!people.length) { alert('กรุณาเพิ่มรายชื่อคนก่อนนะ!'); return; }
  if (!menus.length)  { alert('กรุณาเพิ่มเมนูอาหารก่อนนะ!'); return; }

  var totals = {};
  people.forEach(function(p) { totals[p.id] = { total: 0, items: [] }; });
  
  var grand = 0;
  var grandItemsHtml = ''; // ตัวแปรเก็บ HTML ของใบเสร็จรวม

  menus.forEach(function(m) {
    var price = parseFloat(m.price) || 0;
    
    // สร้างลิสต์ใบเสร็จรวม (เฉพาะที่มีชื่อหรือมีราคา)
    if (m.name || price > 0) {
      grandItemsHtml += '<div class="gitem"><span class="gitem-n">' + esc(m.name || 'เมนูไม่มีชื่อ') + '</span><span class="gitem-a">฿' + price.toLocaleString('th-TH',{minimumFractionDigits:2, maximumFractionDigits:2}) + '</span></div>';
    }

    grand += price;
    if (!m.eaters.length) return;
    var share = price / m.eaters.length;
    m.eaters.forEach(function(eid) {
      if (totals[eid]) {
        totals[eid].total += share;
        totals[eid].items.push({ name: m.name || 'เมนูไม่มีชื่อ', share: share, n: m.eaters.length });
      }
    });
  });

  // อัปเดตยอดรวมและรายการในกล่องใบเสร็จ
  document.getElementById('grand-total').textContent = '฿' + grand.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (!grandItemsHtml) grandItemsHtml = '<div class="gitem"><span class="gitem-n">ไม่มีรายการอาหาร</span><span class="gitem-a">-</span></div>';
  document.getElementById('grand-items').innerHTML = grandItemsHtml;

  var con = document.getElementById('summaries');
  con.innerHTML = '';

  people.forEach(function(p, i) {
    var d = totals[p.id], name = plabel(p);
    var card = document.createElement('div');
    card.className = 'scard';
    card.style.cssText = 'animation:fi .3s ease ' + (i * 0.07) + 's both';

    var itemsHtml = !d.items.length
      ? '<div class="sitem"><span class="sitem-n" style="color:var(--muted)">ไม่ได้กินอะไรเลย</span><span>-</span></div>'
      : d.items.map(function(it) {
          return '<div class="sitem"><span class="sitem-n">' + esc(it.name) +
            (it.n > 1 ? ' <small>(÷' + it.n + ')</small>' : '') +
            '</span><span class="sitem-a">฿' +
            it.share.toLocaleString('th-TH',{minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</span></div>';
        }).join('');

    card.innerHTML =
      '<div class="shead">' +
        '<div class="savatar">' + esc(name.charAt(0).toUpperCase()) + '</div>' +
        '<div class="sname">' + esc(name) + '</div>' +
        '<div class="stotal">฿' + d.total.toLocaleString('th-TH',{minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div>' +
      '</div><div class="sitems">' + itemsHtml + '</div>';
    con.appendChild(card);
  });

  var sec = document.getElementById('summary-sec');
  sec.style.display = 'block';
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadScript(src, cb) {
  if (document.querySelector('script[src="' + src + '"]')) { cb(); return; }
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  document.body.appendChild(s);
}

var H2C = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
var JPDF = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';

function prepareForCapture() {
  document.querySelectorAll('.scard').forEach(function(el) {
    el.style.animation = 'none';
    el.style.opacity = '1';
    el.style.transform = 'none';
  });
}

document.getElementById('btn-img').addEventListener('click', function() {
  var btn = this;
  btn.classList.add('busy'); btn.textContent = '⏳ กำลังสร้าง...';
  
  prepareForCapture(); 

  loadScript(H2C, function() {
    var target = document.getElementById('summary-sec');
    html2canvas(target, { 
      backgroundColor: '#121212', 
      scale: 2, 
      useCORS: true, 
      logging: false,
      scrollY: -window.scrollY, 
      windowHeight: document.documentElement.scrollHeight 
    })
    .then(function(canvas) {
      var a = document.createElement('a');
      a.download = 'หารค่าข้าว.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    })
    .catch(function(e) { alert('Error: ' + e.message); })
    .finally(function() { btn.classList.remove('busy'); btn.textContent = '🖼️ บันทึกรูป'; });
  });
});

document.getElementById('btn-pdf').addEventListener('click', function() {
  var btn = this;
  btn.classList.add('busy'); btn.textContent = '⏳ กำลังสร้าง...';
  
  prepareForCapture(); 

  loadScript(H2C, function() {
    loadScript(JPDF, function() {
      var target = document.getElementById('summary-sec');
      html2canvas(target, { 
        backgroundColor: '#121212', 
        scale: 2, 
        useCORS: true, 
        logging: false,
        scrollY: -window.scrollY, 
        windowHeight: document.documentElement.scrollHeight 
      })
      .then(function(canvas) {
        var img = canvas.toDataURL('image/png');
        var jsPDF = window.jspdf.jsPDF;
        var pw = 210, ph = (canvas.height / canvas.width) * pw;
        var pdf = new jsPDF({ orientation: ph > pw ? 'p':'l', unit:'mm', format:[pw,ph] });
        pdf.addImage(img, 'PNG', 0, 0, pw, ph);
        pdf.save('หารค่าข้าว.pdf');
      })
      .catch(function(e) { alert('Error: ' + e.message); })
      .finally(function() { btn.classList.remove('busy'); btn.textContent = '📄 บันทึก PDF'; });
    });
  });
});
